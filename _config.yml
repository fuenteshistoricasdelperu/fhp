# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Fuentes Historicas del Peru
subtitle: "Ubicando, sistematizando y difundiendo"
email: fuenteshistoricasdelperu@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Equipo interdisciplinario dedicado al estudio, preservación y visibilación
  de recursos de interés para el estudio histórico del Perú.
lang: "es" # Cambiar a "en" en la versión en inglés
locale: "es_ES"
baseurl: "/fhp" # the subpath of your site, e.g. /blog
url: "localhost:4000" # the base hostname & protocol for your site, e.g. http://example.com
masthead_title: "Fuentes Históricas del Perú"
masthead_title_link: /fhp/
logo: /assets/images/logo-fhp.png

# -----------------------------------------------------------------------------
# INFORMACIÓN DEL AUTOR / EQUIPO
# -----------------------------------------------------------------------------
author:
  name: "Fuentes Históricas del Perú"
  avatar: "/assets/images/logo-fhp.png"
  bio: "Equipo de investigación y difusión histórica dedicado a fortalecer el acceso y análisis de fuentes documentales peruanas."
  location: "Perú"
  links:
    - label: "Instagram"
      icon: "fab fa-instagram"
      url: "https://www.instagram.com/fuenteshistoricas/"
    - label: "Facebook"
      icon: "fab fa-facebook"
      url: "https://www.facebook.com/fuenteshistoricasdelperu"
    - label: "YouTube"
      icon: "fab fa-youtube"
      url: "https://www.youtube.com/@fuenteshistoricasdelperu6073"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/fuenteshistoricasdelperu"

# Build settings
remote_theme: "mmistakes/minimal-mistakes"

minimal_mistakes_skin: "default"

# -----------------------------------------------------------------------------
# CONFIGURACIÓN DE REDES Y ANALÍTICA
# -----------------------------------------------------------------------------
twitter_username: "PeruFuentes" # ya no se usa, pero lo dejamos vacío
facebook_username: "fuenteshistoricasdelperu"
instagram_username: "fuenteshistoricas"
youtube_channel: "@fuenteshistoricasdelperu6073"
github_username: "fuenteshistoricasdelperu"

# -----------------------------------------------------------------------------
# FUNCIONES Y PLUGINS
# -----------------------------------------------------------------------------
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-include-cache

paginate: 7  # Número de posts por página
paginate_path: "/page:num/"
timezone: "America/Lima"

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# -----------------------------------------------------------------------------
# CONFIGURACIÓN MULTILINGÜE (para futuro)
# -----------------------------------------------------------------------------
# Podrás duplicar las carpetas y usar _config.en.yml más adelante
languages:
  es: "Español"
  en: "English"

# -----------------------------------------------------------------------------
# OTROS AJUSTES
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# -----------------------------------------------------------------------------
# FOOTER / PIE DE PÁGINA
# -----------------------------------------------------------------------------
footer:
  links:
    - label: "Instagram"
      icon: "fab fa-instagram"
      url: "https://www.instagram.com/fuenteshistoricas/"
    - label: "Facebook"
      icon: "fab fa-facebook"
      url: "https://www.facebook.com/fuenteshistoricasdelperu/"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/fuenteshistoricasdelperu"
    - label: "WordPress"
      icon: "fas fa-globe"
      url: "https://fuenteshistoricasdelperu.com/"